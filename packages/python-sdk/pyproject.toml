[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mneme"
version = "1.0.0"
description = "Context-aware memory router for AI agents."
authors = [{ name = "MNEME Contributors", email = "hello@mneme.dev" }]
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "requests>=2.30.0",
    "pydantic>=2.0.0"
]

[project.optional-dependencies]
langgraph = ["langgraph>=0.0.26"]
crewai = ["crewai>=0.22.0"]
autogen = ["pyautogen>=0.2.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/mneme"]
