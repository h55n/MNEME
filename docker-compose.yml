version: '3.9'

services:
  # ── PostgreSQL + pgvector ───────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mneme-postgres
    environment:
      POSTGRES_DB: mneme
      POSTGRES_USER: mneme
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mneme']
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mneme-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Neo4j ───────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: mneme-neo4j
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - '7474:7474'   # Browser UI
      - '7687:7687'   # Bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'cypher-shell -u neo4j -p password "RETURN 1"']
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Database Migration Init Container ───────────────────────────────────────
  # Runs before the API — applies all pending SQL migrations.
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: mneme-migrate
    command: ['node', 'apps/api/dist/migrate.js']
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://mneme:password@postgres:5432/mneme
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'   # Run once and exit

  # ── API ─────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: mneme-api
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://mneme:password@postgres:5432/mneme
      REDIS_URL: redis://redis:6379
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      JWT_SECRET: dev-secret-change-in-prod
      API_KEY_SALT: dev-salt-change-in-prod
      API_PORT: 3001
      MONAD_RPC_URL: ${MONAD_RPC_URL:-https://rpc-devnet.monad.xyz}
      MONAD_PRIVATE_KEY: ${MONAD_PRIVATE_KEY:-}
      VAULT_REGISTRY_ADDRESS: ${VAULT_REGISTRY_ADDRESS:-0x19b31A7F2759Dac9FFe8Bf9C9D7e2C5446068b73}
      ATTESTATION_AGGREGATOR_ADDRESS: ${ATTESTATION_AGGREGATOR_ADDRESS:-0x9c36aC707F29f0EfBb147710A288e3c9e4069A93}
      MEMORY_MARKET_ADDRESS: ${MEMORY_MARKET_ADDRESS:-0x0EE8903784a4f4974003548e0682d484849c7E27}
      DELETION_PROVER_ADDRESS: ${DELETION_PROVER_ADDRESS:-0xF66260602E13e05EAcc56c238cD26587A3Cad9ea}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      EXTRACTION_SERVICE_URL: http://extraction:8001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Extraction Service (Python FastAPI) ──────────────────────────────────────
  extraction:
    build:
      context: apps/extraction
      dockerfile: Dockerfile
    container_name: mneme-extraction
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - '8001:8001'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'python', '-c', "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Web Dashboard ────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: mneme-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/v1
    ports:
      - '3000:3000'
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
