name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  # ── Lint & Type Check ───────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Build shared (required by downstream checks)
        run: npm run build --workspace=packages/shared
      - name: Type-check API
        run: npx tsc --noEmit --project apps/api/tsconfig.json
      - name: Type-check MCP
        run: npx tsc --noEmit --project apps/mcp/tsconfig.json

  # ── Unit Tests: Classifier ──────────────────────────────────────────────────
  test-classifier:
    name: Classifier Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build --workspace=packages/shared
      - name: Run classifier tests
        run: npx vitest run src/__tests__/classifier.test.ts
        working-directory: apps/api

  # ── API Integration Tests ───────────────────────────────────────────────────
  test-api:
    name: API Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: mneme_test
          POSTGRES_USER: mneme
          POSTGRES_PASSWORD: password
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://mneme:password@localhost:5432/mneme_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      ENCRYPTION_SECRET: "test-encryption-secret-minimum-32-chars-long-123"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build --workspace=packages/shared

      - name: Run migrations on test database
        run: npm run db:migrate:run
        env:
          DATABASE_URL: postgresql://mneme:password@localhost:5432/mneme_test

      - name: Run API tests (E2E + unit)
        run: npm test --workspace=apps/api
        env:
          DATABASE_URL: postgresql://mneme:password@localhost:5432/mneme_test
          REDIS_URL: redis://localhost:6379

  # ── Smart Contract Tests ────────────────────────────────────────────────────
  test-contracts:
    name: Smart Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
        working-directory: contracts
      - run: npx hardhat compile
        working-directory: contracts
      - run: npx hardhat test
        working-directory: contracts

  # ── Build All ───────────────────────────────────────────────────────────────
  build:
    name: Build All Packages
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Build everything (turbo)
        run: npm run build

  # ── Docker Build & Push ─────────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build, test-api, test-classifier]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mneme-api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (Web)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mneme-web
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Migration Dry-run Validation ────────────────────────────────────────────
  validate-migrations:
    name: Validate SQL Migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: mneme_validate
          POSTGRES_USER: mneme
          POSTGRES_PASSWORD: password
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Run migrations (idempotency check — run twice)
        run: |
          npm run db:migrate:run
          npm run db:migrate:run
        env:
          DATABASE_URL: postgresql://mneme:password@localhost:5432/mneme_validate
