type BatchAttested {
  id: ID!
  batchId: BigInt!
  attestationCount: BigInt!
  submitter: String!
  timestamp: BigInt!
  transactionHash: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
}

type OwnershipTransferred {
  id: ID!
  previousOwner: String!
  newOwner: String!
  transactionHash: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
}

type SubmitterAuthorised {
  id: ID!
  submitter: String!
  authorised: Boolean!
  transactionHash: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
}
