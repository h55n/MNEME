services:
  # ── Redis (Managed Cache & Rate Limiting) ─────────────────────────
  - type: redis
    name: mneme-redis
    plan: free

  # ── API Service (Node.js Backend) ─────────────────────────────────
  - type: web
    name: mneme-api
    env: docker
    region: ohio
    plan: free
    dockerContext: .
    dockerfilePath: apps/api/Dockerfile
    envVars:
      # Database Connections
      - key: DATABASE_URL
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: mneme-redis
          property: connectionString

      # Blockchains & Smart Contracts
      - key: MONAD_RPC_URL
        sync: false
      - key: MONAD_PRIVATE_KEY
        sync: false
      - key: ATTESTATION_AGGREGATOR_ADDRESS
        sync: false
      - key: DELETION_PROVER_ADDRESS
        sync: false

      # Internal Microservices (optional — API degrades gracefully without it)
      - key: EXTRACTION_SERVICE_URL
        sync: false

      # API Keys & Auth
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_SECRET
        generateValue: true

  # ── Web Frontend (Next.js Dashboard) ──────────────────────────────
  - type: web
    name: mneme-web
    env: docker
    region: ohio
    plan: free
    dockerContext: .
    dockerfilePath: apps/web/Dockerfile
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: mneme-api
          property: url
