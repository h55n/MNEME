{{- if and .Values.secrets.create .Values.secrets.data }}
# Local dev only — use External Secrets Operator in production.
# Set secrets.create=true only when deploying to a local/staging cluster.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.name }}
  labels:
    {{- include "mneme.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $val := .Values.secrets.data }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
{{- end }}
